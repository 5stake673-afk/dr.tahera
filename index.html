  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Tajawal", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #d8d8d8;
    }

    .card {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      background: linear-gradient(160deg, #e8e8e8 0%, #d8d8d8 50%, #c8c8c8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 40px;
      position: relative;
      overflow: hidden;
    }

    .top-icon {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 32px;
      height: 32px;
      opacity: 0.5;
    }

    .share-icon {
      position: absolute;
      top: 18px;
      left: 18px;
      width: 28px;
      height: 28px;
      opacity: 0.45;
      cursor: pointer;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      font-size: 24px;
      font-weight: 700;
      color: #111;
      margin-bottom: 10px;
      text-align: center;
    }

    .bio {
      font-size: 14px;
      font-weight: 700;
      color: #111;
      text-align: center;
      line-height: 1.7;
      margin-bottom: 36px;
      max-width: 280px;
    }

    .whatsapp-btn {
      width: 100%;
      background: #fff;
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    .whatsapp-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    }

    .whatsapp-btn:active { transform: scale(0.98); }

    .wa-icon { width: 36px; height: 36px; flex-shrink: 0; }

    .btn-text {
      font-family: "Tajawal", sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #222;
      flex: 1;
      text-align: right;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar { animation: fadeUp 0.5s ease forwards; }
    .name { animation: fadeUp 0.5s 0.1s ease both; }
    .bio { animation: fadeUp 0.5s 0.2s ease both; }
    .whatsapp-btn { animation: fadeUp 0.5s 0.3s ease both; }
  </style>
</head>
