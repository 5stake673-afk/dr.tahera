  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
    }

    .card {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      background: linear-gradient(160deg, #3a3a3a 0%, #2a2a2a 50%, #1f1f1f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 40px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(180,160,130,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .top-icon {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 32px;
      height: 32px;
      opacity: 0.7;
    }

    .share-icon {
      position: absolute;
      top: 18px;
      left: 18px;
      width: 28px;
      height: 28px;
      opacity: 0.6;
      cursor: pointer;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #888 0%, #aaa 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    .avatar svg {
      width: 60px;
      height: 60px;
      opacity: 0.5;
    }

    .name {
      font-size: 24px;
      font-weight: 700;
      color: #f0ece4;
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .bio {
      font-size: 13px;
      font-weight: 300;
      color: #b0a898;
      text-align: center;
      line-height: 1.7;
      margin-bottom: 36px;
      max-width: 280px;
    }

    .whatsapp-btn {
      width: 100%;
      background: #fff;
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    .whatsapp-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    .whatsapp-btn:active {
      transform: scale(0.98);
    }

    .wa-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .btn-text {
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #222;
      flex: 1;
      text-align: right;
    }

    .dots {
      margin-right: auto;
      color: #999;
      font-size: 18px;
      letter-spacing: 2px;
    }

    .footer {
      margin-top: auto;
      padding-top: 40px;
      text-align: center;
    }

    .join-btn {
      background: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 28px;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      margin-bottom: 20px;
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 0 auto 16px;
    }

    .footer-links {
      font-size: 11px;
      color: #666;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: #666;
      text-decoration: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar { animation: fadeUp 0.5s ease forwards; }
    .name { animation: fadeUp 0.5s 0.1s ease both; }
    .bio { animation: fadeUp 0.5s 0.2s ease both; }
    .whatsapp-btn { animation: fadeUp 0.5s 0.3s ease both; }
  </style>
</head>
